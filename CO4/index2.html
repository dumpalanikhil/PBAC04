<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI CI/CD Optimizer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>AI-Powered CI/CD Optimizer</h1>

    <div class="section">
        <h2>Merge Conflict Resolver</h2>
        <textarea id="code1" placeholder="Paste Version 1 code..."></textarea>
        <textarea id="code2" placeholder="Paste Version 2 code..."></textarea>
        <button onclick="resolveConflict()">Resolve Conflict</button>
        <pre id="output"></pre>
    </div>

    <div class="section">
        <h2>Pipeline Analyzer</h2>
        <input type="number" id="build" placeholder="Build Time (sec)">
        <input type="number" id="test" placeholder="Test Time (sec)">
        <input type="number" id="deploy" placeholder="Deploy Time (sec)">
        <button onclick="analyzePipeline()">Analyze Pipeline</button>
        <pre id="pipelineOutput"></pre>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
